<!DOCTYPE html>

<html>

<head>

    <title>Nova marcação</title>

    <link rel="icon" href="/favicon_black.png">

    <style>

        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }

        .card {
            margin-top: 20px;
            background: white;
            padding: 20px 40px;
            align-items: center;
            max-width: 600px;

        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
        }

        button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        button:hover{
            background-color: mediumseagreen;
        }

    </style>

</head>

<body>

<a href="/painel">← voltar</a>

<div class="card">

    <h2>Nova marcação</h2>

    <form method="POST">

        {% csrf_token %}

        <input name="nome" placeholder="Nome">

        <input name="email" placeholder="Email">

        <input name="telefone" placeholder="Telemóvel">

        <input name="servico" placeholder="Serviço">

        <input name="modelo_bike" placeholder="Modelo da bicicleta">

        <textarea name="mensagem" placeholder="Mensagem"></textarea>

        <input type="date" name="data" id="data" placeholder="Data preferencial">

        <button>

            Guardar

        </button>

    </form>

</div>

</body>

</html>
