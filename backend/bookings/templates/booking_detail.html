<!DOCTYPE html>

<html>

<head>

    <link rel="icon" type="image/png" href="/favicon_black.png">


    <title>Detalhe</title>

    <style>

        body {
            font-family: Arial;
            padding: 40px;
            background: #f5f5f5;
        }

        .card {
            background: white;
            padding: 20px;
            max-width: 600px;
        }

        button {
            padding: 10px;
            background: #2ecc71;
            border: none;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover{
            background-color: mediumseagreen;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
        }

    </style>

</head>

<body>

<a href="/painel" class="back">← voltar</a>

<div class="card">

    <h2>{{ booking.nome }}</h2>

    <p><b>Email:</b> {{ booking.email }}</p>

    <p><b>Telefone:</b> {{ booking.telefone }}</p>

    <p><b>Serviço:</b> {{ booking.servico }}</p>

    <p><b>Bicicleta:</b> {{ booking.modelo_bike }}</p>

    <p><b>Data:</b> {{ booking.data }}</p>

    <p><b>Estado:</b> {{ booking.estado }}</p>

    <p><b>Mensagem:</b></p>

    <p>{{ booking.mensagem }}</p>

    <form method="POST">

        {% csrf_token %}

        <button>

            Marcar como concluído

        </button>

    </form>

</div>

</body>

</html>
