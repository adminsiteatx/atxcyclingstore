<!DOCTYPE html>

<html>

<head>

    <link rel="icon" type="image/png" href="/favicon_black.png">

    <title>Login Admin</title>

    <style>

        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            color: white;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 250px;
        }

        input {
            padding: 10px;
            border: none;
        }

        button {
            padding: 10px;
            background: #2ecc71;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover{
            background-color: mediumseagreen;
        }

    </style>

</head>

<body>

<form method="POST">

    {% csrf_token %}

    <h2>ATX Admin</h2>

    <input name="username" placeholder="user">

    <input name="password" type="password" placeholder="password">

    <button>Entrar</button>

</form>

</body>

</html>
